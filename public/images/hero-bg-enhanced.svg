<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.1)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="80%" cy="20%" r="150" fill="url(#glow)" />
  <circle cx="15%" cy="85%" r="200" fill="url(#glow)" />
  <circle cx="50%" cy="50%" r="300" fill="url(#glow)" opacity="0.2" />
  
  <!-- Decorative elements -->
  <path d="M0,50 Q50,0 100,50 T200,50 T300,50 T400,50 T500,50" stroke="rgba(255, 255, 255, 0.2)" fill="none" stroke-width="2" />
  <path d="M0,70 Q50,20 100,70 T200,70 T300,70 T400,70 T500,70" stroke="rgba(255, 255, 255, 0.15)" fill="none" stroke-width="2" />
  
  <!-- Floating particles -->
  <circle cx="10%" cy="30%" r="5" fill="white" opacity="0.5" />
  <circle cx="20%" cy="15%" r="3" fill="white" opacity="0.5" />
  <circle cx="30%" cy="25%" r="2" fill="white" opacity="0.5" />
  <circle cx="70%" cy="80%" r="4" fill="white" opacity="0.5" />
  <circle cx="85%" cy="70%" r="3" fill="white" opacity="0.5" />
  <circle cx="60%" cy="40%" r="2" fill="white" opacity="0.5" />
  <circle cx="40%" cy="60%" r="3" fill="white" opacity="0.5" />
  <circle cx="90%" cy="40%" r="2" fill="white" opacity="0.5" />
  
  <rect x="0" y="0" width="100%" height="100%" fill="url(#fade)" />
</svg>