<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bdbdbd" />
      <stop offset="100%" stop-color="#757575" />
    </linearGradient>
    
    <!-- Mountain shapes -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>
  
  <!-- Base background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- Abstract mountain shapes -->
  <path d="M0,1080 L0,780 Q480,600 960,780 T1920,780 L1920,1080 Z" fill="#9e9e9e" opacity="0.4" />
  <path d="M0,1080 L0,840 Q480,720 960,840 T1920,840 L1920,1080 Z" fill="#9e9e9e" opacity="0.3" />
  
  <!-- Distant mountains with blur -->
  <path d="M0,600 L240,500 L480,580 L720,520 L960,600 L1200,550 L1440,590 L1680,540 L1920,600 L1920,1080 L0,1080 Z" 
        fill="#616161" opacity="0.2" filter="url(#blur)" />
  
  <!-- Stars/particles -->
  <g opacity="0.8">
    <circle cx="100" cy="100" r="2" fill="white" />
    <circle cx="300" cy="200" r="1.5" fill="white" />
    <circle cx="500" cy="150" r="2" fill="white" />
    <circle cx="700" cy="250" r="1" fill="white" />
    <circle cx="900" cy="100" r="2" fill="white" />
    <circle cx="1100" cy="200" r="1.5" fill="white" />
    <circle cx="1300" cy="150" r="1" fill="white" />
    <circle cx="1500" cy="250" r="2" fill="white" />
    <circle cx="1700" cy="100" r="1.5" fill="white" />
    <circle cx="1900" cy="200" r="1" fill="white" />
    
    <circle cx="200" cy="300" r="1" fill="white" />
    <circle cx="400" cy="350" r="1.5" fill="white" />
    <circle cx="600" cy="300" r="1" fill="white" />
    <circle cx="800" cy="350" r="2" fill="white" />
    <circle cx="1000" cy="300" r="1" fill="white" />
    <circle cx="1200" cy="350" r="1.5" fill="white" />
    <circle cx="1400" cy="300" r="1" fill="white" />
    <circle cx="1600" cy="350" r="2" fill="white" />
    <circle cx="1800" cy="300" r="1" fill="white" />
  </g>
  
  <!-- Larger glowing elements -->
  <circle cx="300" cy="300" r="100" fill="#9e9e9e" opacity="0.2" filter="url(#blur)" />
  <circle cx="1600" cy="400" r="150" fill="#9e9e9e" opacity="0.15" filter="url(#blur)" />
  <circle cx="800" cy="200" r="80" fill="#9e9e9e" opacity="0.1" filter="url(#blur)" />
  
  <!-- Overlay gradient for better text visibility -->
  <rect width="100%" height="100%" fill="rgba(0,0,0,0.2)" />
</svg>